<svg xmlns="http://www.w3.org/2000/svg" width="778" height="778" viewBox="0 0 778 778">
  <defs>
    <linearGradient id="leg" x1="0" y1="130" x2="0" y2="618" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d6ae62"/>
      <stop offset="0.5" stop-color="#c1923c"/>
      <stop offset="1" stop-color="#76541a"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="300" y1="0" x2="528" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b07f38"/>
      <stop offset="0.35" stop-color="#d2a652"/>
      <stop offset="0.62" stop-color="#e7bf66"/>
      <stop offset="1" stop-color="#c0903f"/>
    </linearGradient>
  </defs>
  <!-- left + right legs meet at center (389,374) -->
  <path d="M242 130 L319 130 L389 374 L318 618 L242 618 Z" fill="url(#leg)"/>
  <path d="M533 130 L456 130 L389 374 L457 618 L533 618 Z" fill="url(#leg)"/>
  <!-- horizontal ribbon band across the middle -->
  <path d="M300 327 L526 331 L526 404 L300 408 Z" fill="url(#ribbon)"/>
  <!-- subtle fold shadow on ribbon's left underside -->
  <path d="M300 327 L372 330 L390 406 L300 408 Z" fill="#000000" opacity="0.10"/>
